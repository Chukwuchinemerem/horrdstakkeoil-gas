<rect x="120" y="336" width="400" height="30" rx="8" fill="#34495e"/>
<rect x="120" y="339" width="400" height="8" fill="rgba(255,255,255,0.07)"/>
<!-- Caption -->
<text x="400" y="465" text-anchor="middle" font-family="Arial,sans-serif" font-size="18" font-weight="bold" fill="rgba(255,255,255,0.9)">SEMI-SUBMERSIBLE OFFSHORE DRILLING RIG</text>
<text x="400" y="485" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="rgba(255,255,255,0.55)">Ultra-Deep Water • 3,000m Depth Rating • 120 POB</text>
</svg>