<circle cx="540" cy="165" r="38" fill="#27ae60" opacity="0.8"/>
<circle cx="540" cy="165" r="34" fill="none" stroke="white" stroke-width="3"/>
<text x="540" y="170" text-anchor="middle" font-family="Arial,sans-serif" font-size="22" font-weight="bold" fill="white">H</text>
<!-- Drill tower/derrick -->
<polygon points="340,25 310,130 370,130" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/>
<line x1="325" y1="70" x2="355" y2="70" stroke="#c0392b" stroke-width="3"/>
<line x1="320" y1="90" x2="360" y2="90" stroke="#c0392b" stroke-width="3"/>
<line x1="315" y1="110" x2="365" y2="110" stroke="#c0392b" stroke-width="3"/>
