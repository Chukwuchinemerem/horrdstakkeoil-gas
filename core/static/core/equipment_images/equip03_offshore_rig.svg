<line x1="175" y1="150" x2="130" y2="100" stroke="#7f8c8d" stroke-width="5"/>
<circle cx="128" cy="96" r="10" fill="#f39c12"/>
<circle cx="128" cy="96" r="20" fill="#f39c12" opacity="0.3"/>
