<rect x="185" y="80" width="140" height="55" rx="4" fill="#1a252f"/>
<rect x="190" y="85" width="50" height="25" fill="#3498db" opacity="0.6" rx="2"/>
<rect x="245" y="85" width="50" height="25" fill="#3498db" opacity="0.6" rx="2"/>
<rect x="300" y="85" width="20" height="25" fill="#3498db" opacity="0.6" rx="2"/>
<!-- Crane -->
<rect x="490" y="50" width="14" height="150" fill="#e67e22"/>
<line x1="497" y1="60" x2="570" y2="60" stroke="#e67e22" stroke-width="8"/>
