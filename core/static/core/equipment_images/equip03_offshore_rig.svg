<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
<defs><linearGradient id="sky3" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0d1b2a"/><stop offset="100%" stop-color="#1e3a5f"/></linearGradient>
<linearGradient id="sea3" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0a3d5c"/><stop offset="100%" stop-color="#061829"/></linearGradient></defs>
<rect width="800" height="500" fill="url(#sky3)"/>
<rect x="0" y="340" width="800" height="160" fill="url(#sea3)"/>
<!-- Waves -->
<path d="M0 340 Q100 330 200 340 Q300 350 400 340 Q500 330 600 340 Q700 350 800 340 L800 355 L0 355Z" fill="rgba(255,255,255,0.06)"/>
<!-- Stars -->
<circle cx="50" cy="40" r="2" fill="white" opacity="0.8"/>
<circle cx="120" cy="25" r="1.5" fill="white" opacity="0.6"/>
<circle cx="200" cy="60" r="2" fill="white" opacity="0.7"/>
<circle cx="650" cy="30" r="2" fill="white" opacity="0.8"/>
<circle cx="720" cy="55" r="1.5" fill="white" opacity="0.6"/>
<circle cx="760" cy="20" r="2" fill="white" opacity="0.7"/>
