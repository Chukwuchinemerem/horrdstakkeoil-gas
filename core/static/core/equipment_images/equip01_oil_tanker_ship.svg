<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
<defs><linearGradient id="sky" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1a3a5c"/><stop offset="100%" stop-color="#2d6a9f"/></linearGradient>
<linearGradient id="sea" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0d4a6e"/><stop offset="100%" stop-color="#0a2d42"/></linearGradient>
<linearGradient id="hull" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#c0392b"/><stop offset="100%" stop-color="#8e1a0e"/></linearGradient></defs>
<rect width="800" height="500" fill="url(#sky)"/>
<!-- Sea -->
<rect x="0" y="320" width="800" height="180" fill="url(#sea)"/>
<!-- Waves -->
<path d="M0 330 Q50 320 100 330 Q150 340 200 330 Q250 320 300 330 Q350 340 400 330 Q450 320 500 330 Q550 340 600 330 Q650 320 700 330 Q750 340 800 330 L800 340 L0 340Z" fill="rgba(255,255,255,0.08)"/>
<path d="M0 350 Q60 340 120 350 Q180 360 240 350 Q300 340 360 350 Q420 360 480 350 Q540 340 600 350 Q660 360 720 350 Q760 340 800 350 L800 365 L0 365Z" fill="rgba(255,255,255,0.05)"/>
<!-- Ship Hull -->
<path d="M80 340 L720 340 L760 380 L40 380Z" fill="url(#hull)"/>
<rect x="80" y="260" width="640" height="80" rx="4" fill="#c0392b"/>
<rect x="80" y="264" width="640" height="6" fill="#e74c3c"/>
<!-- White stripe -->
<rect x="80" y="294" width="640" height="12" fill="#ecf0f1"/>
<!-- Superstructure -->
<rect x="560" y="180" width="160" height="85" rx="4" fill="#2c3e50"/>
<rect x="580" y="195" width="40" height="30" fill="#3498db" rx="2"/>
<rect x="630" y="195" width="40" height="30" fill="#3498db" rx="2"/>
<rect x="680" y="195" width="25" height="30" fill="#3498db" rx="2"/>
<!-- Radar/antenna -->
<line x1="640" y1="180" x2="640" y2="145" stroke="#95a5a6" stroke-width="3"/>
<line x1="630" y1="155" x2="650" y2="155" stroke="#95a5a6" stroke-width="3"/>
<circle cx="640" cy="142" r="5" fill="#e74c3c"/>
<!-- Cargo tanks -->
<rect x="110" y="230" width="90" height="35" rx="18" fill="#7f8c8d"/>
<rect x="220" y="230" width="90" height="35" rx="18" fill="#7f8c8d"/>
<rect x="330" y="230" width="90" height="35" rx="18" fill="#7f8c8d"/>
<rect x="440" y="230" width="90" height="35" rx="18" fill="#7f8c8d"/>
<!-- Tank highlights -->
<rect x="115" y="233" width="80" height="8" rx="4" fill="rgba(255,255,255,0.2)"/>
<rect x="225" y="233" width="80" height="8" rx="4" fill="rgba(255,255,255,0.2)"/>
<rect x="335" y="233" width="80" height="8" rx="4" fill="rgba(255,255,255,0.2)"/>
<rect x="445" y="233" width="80" height="8" rx="4" fill="rgba(255,255,255,0.2)"/>
<!-- Bow -->
<path d="M80 340 L40 380 L80 380Z" fill="#8e1a0e"/>
<!-- Rudder/propeller area -->
<rect x="700" y="360" width="30" height="20" rx="3" fill="#7f8c8d"/>
<!-- Smoke stack -->
<rect x="640" y="148" width="20" height="35" rx="4" fill="#2c3e50"/>
<ellipse cx="650" cy="148" rx="12" ry="5" fill="#34495e"/>
<!-- Smoke -->
<circle cx="655" cy="130" r="12" fill="rgba(200,200,200,0.3)"/>
<circle cx="665" cy="115" r="9" fill="rgba(200,200,200,0.2)"/>
<circle cx="658" cy="100" r="7" fill="rgba(200,200,200,0.15)"/>
<!-- Label -->
<text x="400" y="465" text-anchor="middle" font-family="Arial,sans-serif" font-size="18" font-weight="bold" fill="rgba(255,255,255,0.9)">CRUDE OIL TANKER — CLASS VLCC</text>
<text x="400" y="485" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="rgba(255,255,255,0.55)">300,000 DWT • Deep Sea Operations</text>
</svg>