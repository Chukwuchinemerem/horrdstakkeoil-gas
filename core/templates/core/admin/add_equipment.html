{% extends 'core/admin/admin_base.html' %}
{% block page_title %}Add Equipment{% endblock %}
{% block page_subtitle %}Add a new item to the catalog{% endblock %}
{% block a_equip %}active{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto">
  <div class="mb-4"><a href="{% url 'admin_equipment' %}" class="text-sm hover:text-white" style="color:#2563EB;font-family:'DM Sans',sans-serif;text-decoration:none;">← Back to Equipment</a></div>
  <div class="rounded-2xl p-6 card-dark">
    <h3 class="font-display font-bold text-white text-xl mb-6">New Equipment</h3>
    <form method="post" enctype="multipart/form-data" class="space-y-5">
      {% csrf_token %}
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
        <div class="sm:col-span-2"><label class="block text-xs font-bold tracking-widest mb-2" style="color:#94A3B8;font-family:'DM Sans',sans-serif;">EQUIPMENT NAME</label><input type="text" name="name" required placeholder="e.g. Crude Oil Tanker 50K BBL" class="input-dark"/></div>
        <div><label class="block text-xs font-bold tracking-widest mb-2" style="color:#94A3B8;font-family:'DM Sans',sans-serif;">CATEGORY</label><select name="category" required class="input-dark"><option value="">Select...</option><option value="tanker">Oil Tanker</option><option value="truck">Truck</option><option value="trailer">Tanker Trailer</option><option value="storage">Storage Tank</option><option value="industrial">Industrial Equipment</option><option value="offshore">Offshore Equipment</option><option value="pipeline">Pipeline Equipment</option><option value="drilling">Drilling Equipment</option></select></div>
        <div><label class="block text-xs font-bold tracking-widest mb-2" style="color:#94A3B8;font-family:'DM Sans',sans-serif;">DAILY RATE (USD)</label><input type="number" name="daily_rate" step="0.01" min="1" required placeholder="e.g. 4500.00" class="input-dark"/></div>
        <div><label class="block text-xs font-bold tracking-widest mb-2" style="color:#94A3B8;font-family:'DM Sans',sans-serif;">CAPACITY</label><input type="text" name="capacity" placeholder="e.g. 50,000 BBL" class="input-dark"/></div>
        <div><label class="block text-xs font-bold tracking-widest mb-2" style="color:#94A3B8;font-family:'DM Sans',sans-serif;">LOCATION</label><input type="text" name="location" placeholder="e.g. Houston, TX" class="input-dark"/></div>
        <div><label class="block text-xs font-bold tracking-widest mb-2" style="color:#94A3B8;font-family:'DM Sans',sans-serif;">STATUS</label><select name="status" class="input-dark"><option value="available">Available</option><option value="rented">Rented</option><option value="maintenance">Under Maintenance</option></select></div>
        <div class="flex items-center gap-3"><input type="checkbox" name="featured" id="featured" class="w-4 h-4 rounded" style="accent-color:#2563EB;"><label for="featured" class="text-sm text-white" style="font-family:'DM Sans',sans-serif;">Mark as Featured</label></div>
        <div class="sm:col-span-2"><label class="block text-xs font-bold tracking-widest mb-2" style="color:#94A3B8;font-family:'DM Sans',sans-serif;">DESCRIPTION</label><textarea name="description" rows="4" required placeholder="Full equipment description..." class="input-dark" style="resize:none;"></textarea></div>
        <div class="sm:col-span-2"><label class="block text-xs font-bold tracking-widest mb-2" style="color:#94A3B8;font-family:'DM Sans',sans-serif;">IMAGE (OPTIONAL)</label><input type="file" name="image" accept="image/*" class="input-dark" style="padding:8px;"/></div>
      </div>
      <button type="submit" class="btn-blue w-full py-4 text-sm">Add Equipment to Catalog</button>
    </form>
  </div>
</div>
{% endblock %}
